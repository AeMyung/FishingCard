<!DOCTYPE html>
<html lang="ko">

<head>

    <meta charset="UTF-8">

    <title>상점</title>

    <link rel="stylesheet" href="../css/shop.css">

</head>

<body>

    <a class="home" href="../menu/menu.html">

        ← 메인 메뉴

    </a>

    <h1>🛒 상점</h1>

    <div id="goldBox">

        💰 0 G

    </div>

    <div id="tabBox">

        <button id="sellTab" class="tabBtn">

            판매

        </button>

        <button id="buyTab" class="tabBtn">

            구매

        </button>

    </div>

    <div id="buyCategory">

        <button id="rodTab" class="categoryBtn">

            낚싯대

        </button>

        <button id="baitTab" class="categoryBtn">

            미끼

        </button>

        <button id="accessoryTab" class="categoryBtn">

            장신구

        </button>

    </div>

    <div id="shopList">

    </div>

    <div id="sellPopup">

        <div class="popup">

            <h2>판매할 수량</h2>

            <div id="countControl">

                <button id="minBtn">

                    ≪

                </button>

                <button id="minusBtn">

                    ＜

                </button>

                <input id="sellCount" type="number" min="1">

                <button id="plusBtn">

                    ＞

                </button>

                <button id="maxBtn">

                    ≫

                </button>

            </div>

            <div class="popupBtns">

                <button id="cancelSell">

                    취소

                </button>

                <button id="confirmSell">

                    판매

                </button>

            </div>

        </div>

    </div>

    <div id="buyPopup">

        <div class="popup">

            <img id="buyImage">

            <h2 id="buyTitle">

                구매하시겠습니까?

            </h2>

            <div id="buyPrice">

            </div>

            <div class="popupBtns">

                <button id="confirmBuy">

                    구매

                </button>

                <button id="cancelBuy">

                    취소

                </button>

            </div>

        </div>

    </div>

    <div id="detailPopup">

        <div class="detailPopupBox">

            <img id="detailImage">

            <h2 id="detailTitle"></h2>

            <div id="detailDescription"></div>

            <div id="detailDurability"></div>

            <button id="closeDetail">
                닫기
            </button>

        </div>

    </div>

    <div id="baitBuyPopup">

        <div class="popup baitBuyPopupBox">

            <img id="baitBuyImage">

            <h2 id="baitBuyTitle"></h2>

            <div id="baitUnitPrice"></div>

            <h3>구매할 수량</h3>

            <div class="countControl">

                <button id="baitMinBtn">
                    1
                </button>

                <button id="baitMinusBtn">
                    -
                </button>

                <input id="baitBuyCount" type="text" value="1" inputmode="numeric">

                <button id="baitPlusBtn">
                    +
                </button>

                <button id="baitMaxBtn">
                    MAX
                </button>

            </div>

            <div id="baitTotalPrice">
                총 가격 : 0 G
            </div>

            <div class="popupBtns">

                <button id="confirmBaitBuy">
                    구매
                </button>

                <button id="cancelBaitBuy">
                    취소
                </button>

            </div>

        </div>

    </div>

    <script src="../config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="../data/fish.js"></script>

    <script src="../data/item.js"></script>

    <script src="shop.js"></script>

</body>

</html>
